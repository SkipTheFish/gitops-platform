version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: gitops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gitops_platform     # 初始化时创建的数据库名
      POSTGRES_USER: gitops           # 默认数据库用户名
      POSTGRES_PASSWORD: gitops123    # 默认数据库密码
    ports:
      - "5432:5432"                   # 将容器的 PostgreSQL 端口映射到宿主机，方便本地连接
    volumes:
      - postgres_data:/var/lib/postgresql/data  # 挂载持久化卷，防止数据在容器重建后丢失

  redis:
    image: redis:7
    container_name: gitops-redis
    restart: unless-stopped
    ports:
      - "6379:6379"                   # 将 Redis 默认端口暴露到宿主机，供应用访问

# 定义命名卷（named volume），由 Docker 管理生命周期
# 数据实际存储在 Docker 的卷目录中（如 /var/lib/docker/volumes/...），即使容器删除，数据仍保留
volumes:
  postgres_data: