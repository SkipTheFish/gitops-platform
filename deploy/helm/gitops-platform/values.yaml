# 所有可变参数入口

replicaCount: 1   # Pod 副本数

image:
  repository: gitops-platform/backend  # 镜像地址
  tag: latest                          # 镜像版本
  pullPolicy: IfNotPresent             # 拉取策略

service:
  type: ClusterIP   # K8s 内部访问
  port: 8080        # Service 暴露端口

env:
  APP_NAME: gitops-platform
  APP_ENV: dev
  HTTP_PORT: "8080"

  # 数据库配置（注意：现在还是直连宿主机）
  PG_HOST: host.docker.internal
  PG_PORT: "5432"
  PG_USER: gitops
  PG_PASSWORD: gitops123
  PG_DB: gitops_platform
  PG_SSLMODE: disable

  # Redis
  REDIS_ADDR: host.docker.internal:6379
  REDIS_PASSWORD: ""
  REDIS_DB: "0"