# 怎么访问这个服务

apiVersion: v1
kind: Service
metadata:
  name: {{ include "gitops-platform.fullname" . }}
spec:
  selector:
    app: {{ include "gitops-platform.name" . }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}  # 对外端口
      targetPort: 8080                  # 容器端口
  type: {{ .Values.service.type }}      # ClusterIP / NodePort / LoadBalancer